# Сборка debug-APK на GitHub Actions.
# Триггер: push/commit. Результат — .apk как artifact сборки.
# Локально APK НЕ собираем (см. AGENT.md §6).
name: Build debug APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  tests:
    name: Unit tests (pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest
      - name: Run tests
        run: pytest -q

  build-apk:
    name: Build debug APK
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake autoconf libtool build-essential \
            pkg-config libc6-dev m4 libffi-dev \
            python3-dev libssl-dev libltdl-dev \
            libncurses5-dev ccache git unzip curl \
            openjdk-17-jdk

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build with Buildozer
        run: |
          pip install --user buildozer
          export PATH="$HOME/.local/bin:$PATH"
          echo "--- Tool versions ---"
          java -version 2>&1 || true
          which buildozer || true
          echo "--- Build ---"
          buildozer -v android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lesson-tracker-debug-apk
          path: bin/*.apk
          if-no-files-found: error