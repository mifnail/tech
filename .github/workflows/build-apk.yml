# Сборка debug-APK на GitHub Actions.
# Триггер: push/commit. Результат — .apk как artifact сборки.
# Локально APK НЕ собираем (см. AGENT.md §6).
name: Build debug APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  tests:
    name: Unit tests (pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest openpyxl reportlab flask
      - name: Run tests
        run: pytest -q

  build-apk:
    name: Build debug APK
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake autoconf libtool build-essential \
            pkg-config libc6-dev m4 libffi-dev \
            python3-dev libssl-dev libltdl-dev \
            libncurses5-dev ccache git unzip curl \
            openjdk-17-jdk

      - name: Cache Buildozer
        uses: actions/cache@v6
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install Buildozer and Cython
        run: |
          # Swap: избежать OOM при компиляции Kivy под Android
          sudo fallocate -l 4G /swapfile 2>/dev/null || true
          sudo chmod 600 /swapfile 2>/dev/null || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          free -h
          pip install --user buildozer==1.6.0 cython
          export PATH="$HOME/.local/bin:$PATH"
          echo "--- Tool versions ---"
          java -version 2>&1 || true
          buildozer --version 2>&1 || true
          echo "--- Build ---"
          buildozer -v android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: lesson-tracker-debug-apk
          path: bin/*.apk
          if-no-files-found: error