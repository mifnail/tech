name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install flask pytest
      - run: python -m pytest tests/ -v

  build-apk:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            python3-setuptools \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            libltdl-dev \
            ccache

      - name: Cache .buildozer
        uses: actions/cache@v6
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Swap to avoid OOM
        run: |
          sudo fallocate -l 4G /swapfile 2>/dev/null || true
          sudo chmod 600 /swapfile 2>/dev/null || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          free -h

      - name: Install Buildozer
        run: pip install --user buildozer==1.6.0 cython

      - name: Accept Android SDK licenses
        run: |
          yes | $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          buildozer -v android debug 2>&1
        shell: bash
        timeout-minutes: 60

      - name: Find APK
        run: |
          find . -name "*.apk" -type f
          ls -la bin/ 2>/dev/null || echo "bin/ not found"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: teachhelper-debug
          path: bin/*.apk
          if-no-files-found: warn
