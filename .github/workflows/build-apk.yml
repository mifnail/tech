name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  tests:
    name: Unit tests (pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest openpyxl reportlab
      - name: Run tests
        run: pytest -q

  build-apk:
    name: Build debug APK
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            automake autoconf libtool build-essential \
            pkg-config libc6-dev m4 libffi-dev \
            python3-dev libssl-dev libltdl-dev \
            libncurses5-dev ccache git unzip curl \
            openjdk-17-jdk

      - name: Swap to avoid OOM
        run: |
          sudo fallocate -l 4G /swapfile 2>/dev/null || true
          sudo chmod 600 /swapfile 2>/dev/null || true
          sudo mkswap /swapfile 2>/dev/null || true
          sudo swapon /swapfile 2>/dev/null || true
          free -h

      - name: Cache Buildozer
        uses: actions/cache@v6
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install Buildozer
        run: pip install --user buildozer==1.6.0 cython

      - name: Build debug APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          buildozer -v android debug 2>&1
        shell: bash
        timeout-minutes: 60

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: teachhelper-debug
          path: bin/*.apk
          if-no-files-found: error
